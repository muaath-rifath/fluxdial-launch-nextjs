<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ErlangLabs Core Logo</title>
    <style>
        /* Center the logo on the page for display purposes. */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: sans-serif;
        }

        .logo-container {
            width: 400px; /* Adjust size here */
            height: 400px;
            transition: transform 0.3s ease;
        }

        .logo-container:hover {
            transform: scale(1.02);
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- 
          Unified coordinate system for perfect curve alignment.
          Extended viewBox height to 220 to accommodate the shifted shapes.
        -->
        <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Diagonal gradient using exact requested colors -->
                <linearGradient id="logoGrad" x1="30" y1="206" x2="160" y2="14" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#eb4700" />
                    <stop offset="100%" stop-color="#ff7b40" />
                </linearGradient>

                <!-- Back Layer (Top Bar): Longer inverted "L" -->
                <path id="topBar" d="
                    M 30 134 
                    L 30 60 
                    A 46 46 0 0 1 76 14 
                    L 160 14 
                    A 18 18 0 0 1 160 50 
                    L 76 50 
                    A 10 10 0 0 0 66 60 
                    L 66 104 
                    Q 66 134 30 134 Z" />

                <!-- Front Layer (Middle Bar): Shorter inverted "L", identical height and curves, shifted down -->
                <path id="midBar" d="
                    M 30 206 
                    L 30 132 
                    A 46 46 0 0 1 76 86 
                    L 130 86 
                    A 18 18 0 0 1 130 122 
                    L 76 122 
                    A 10 10 0 0 0 66 132 
                    L 66 176 
                    Q 66 206 30 206 Z" />

                <!-- Clip path to constrain the drop shadow strictly to the back bar's boundaries -->
                <clipPath id="topBarClip">
                    <use href="#topBar" />
                </clipPath>

                <!-- Custom drop shadow falling back and up to highlight the front layer overlapping the back -->
                <filter id="shadowFront" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3.5" result="blur" />
                    <feOffset dx="-3" dy="-2" result="offsetBlur" />
                    <feFlood flood-color="#4a0f00" flood-opacity="0.45" result="shadowColor" />
                    <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
                </filter>

                <!-- Subtle shadow and depth for the waveform to match the richness of the main logo -->
                <filter id="waveShadow" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur" />
                    <feOffset dx="1" dy="1.5" result="offsetBlur" />
                    <feFlood flood-color="#4a0f00" flood-opacity="0.3" result="shadowColor" />
                    <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
                    <feMerge>
                        <feMergeNode in="shadow" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- 1. Render Top Bar (Back Layer) -->
            <use href="#topBar" fill="url(#logoGrad)" />

            <!-- 2. Render Shadow cast by the Middle Bar onto the Top Bar -->
            <use href="#midBar" filter="url(#shadowFront)" clip-path="url(#topBarClip)" />

            <!-- 3. Render Middle Bar (Front Layer, perfectly placed on top) -->
            <use href="#midBar" fill="url(#logoGrad)" />

            <!-- 4. Render Audio Waveform (Using main gradient and added depth filter) -->
            <g fill="url(#logoGrad)" filter="url(#waveShadow)">
                <rect x="74" y="144" width="6" height="12" rx="3" ry="3" />
                <rect x="86" y="137" width="6" height="26" rx="3" ry="3" />
                <rect x="98" y="129" width="6" height="42" rx="3" ry="3" />
                <rect x="110" y="137" width="6" height="26" rx="3" ry="3" />
                <rect x="122" y="144" width="6" height="12" rx="3" ry="3" />
            </g>
        </svg>
    </div>

</body>
</html>
