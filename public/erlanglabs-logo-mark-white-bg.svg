<svg viewBox="-100 -100 600 600" xmlns="http://www.w3.org/2000/svg">
    <!-- White background for email compatibility -->
    <rect x="-100" y="-100" width="600" height="600" fill="#ffffff" />
    
    <g id="logo-mark">
        <!-- 
          Main Stylized 'E' Path 
          Uses a single continuous path for the main body with rounded joins 
          for a polished, professional vector finish.
        -->
        <path d="M 140 85 
                 L 300 85 
                 L 282 115 
                 L 192 115 
                 L 140 185 
                 L 254 185 
                 L 236 215 
                 L 140 215 
                 L 192 285 
                 L 268 285 
                 L 250 315 
                 L 140 315 
                 L 80 200 Z" 
              fill="#FF5722" 
              stroke="#FF5722" 
              stroke-width="5" 
              stroke-linejoin="round" />

        <!-- Top Right Node & Connection Line -->
        <line x1="285" y1="91" x2="340" y2="91" stroke="#FF5722" stroke-width="9" />
        <circle cx="352" cy="91" r="11" fill="#ffffff" stroke="#FF5722" stroke-width="8" />

        <!-- Bottom Left Node & Connection Line -->
        <line x1="60" y1="309" x2="140" y2="309" stroke="#FF5722" stroke-width="9" />
        <circle cx="48" cy="309" r="11" fill="#ffffff" stroke="#FF5722" stroke-width="8" />
    </g>
</svg>
